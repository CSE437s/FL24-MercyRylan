{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Google Maps Example</title>
    <link rel="stylesheet" type="text/css" href="{% static 'eventapp/css/home.css' %}">
</head>
<body>
    <h1>Map View Page</h1>
    <div id="map"></div>
    <div id="sidebar">
        <div class="closebtn" onclick="toggleSidebar()">&times;</div>
        <div id="event-list"></div>
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initMap" async defer></script>
    <script>
        var map;
        var service;
        var infowindow;

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var userLocation = new google.maps.LatLng(position.coords.latitude, position.coords.longitude);

                        map = new google.maps.Map(document.getElementById('map'), {
                            center: userLocation,
                            zoom: 15
                        });

                        var request = {
                            location: userLocation,
                            radius: '500',
                            type: ['restaurant']  // For example, change this according to what you want
                        };

                        infowindow = new google.maps.InfoWindow();
                        service = new google.maps.places.PlacesService(map);
                        service.nearbySearch(request, callback);

                        fetchEvents(map);
                    },
                    function(error) {
                        // Handle error
                        alert("Geolocation failed: " + error.message);
                    });
            } else {
                // Browser doesn't support Geolocation
                alert("Your browser doesn't support geolocation.");
            }
        }

        function callback(results, status) {
            if (status == google.maps.places.PlacesServiceStatus.OK) {
                for (var i = 0; i < results.length; i++) {
                    createMarker(results[i]);
                }
            }
        }

        function createMarker(place) {
            var placeLoc = place.geometry.location;
            var marker = new google.maps.Marker({
                map: map,
                position: placeLoc
            });

            google.maps.event.addListener(marker, 'click', function() {
                infowindow.setContent(place.name);
                infowindow.open(map, this);
            });
        }

        function fetchEvents(map) {

            if (events.length > 0) {
                events.forEach(event => {
                    const marker = new google.maps.Marker({
                        position: { lat: event.latitude, lng: event.longitude },
                        map: map,
                        title: event.name
                    });

                    marker.addListener('click', () => {
                        showEventDetails(event);
                    });
                })

            // Populate the right-hand sidebar with events
            const eventList = document.getElementById('event-list');
            eventList.innerHTML = ''; // Clear previous list

            events.forEach(event => {
                const eventElem = document.createElement('div');
                eventElem.classList.add('event');
                eventElem.innerHTML = `
                    <h3>${event.name}</h3>
                    <p>Time: ${event.start}</p>
                    <p>${event.description}</p>
                `;
                eventList.appendChild(eventElem);
            });
            }

        }

        function showEventDetails(event) {
            // Logic for displaying event details in the right sidebar
            toggleSidebar();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
